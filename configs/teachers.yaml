# ============================================================
#  NVIDIA NIM TEACHER MODEL CONFIGURATION (Fortress Categorized)
#  Each teacher has a role, priority, and rate allocation.
#  The agent dynamically selects the best teacher per task.
#  STRICT COMPLIANCE: ONLY models from notes/nvidia_models.txt.
# ============================================================

# Rate budget distribution (total: 40 RPM for Free Tier)
# This budget prevents role-starvation during multi-modal evolution.
rate_budget:
  reasoning: 12
  code: 7
  math: 4
  vision_video: 2
  audio_transcription: 2
  3d_synthesis: 2
  safety: 2
  multimodal_general: 2
  reward: 20
  embedding: 2

teachers:
  # ── BLOCK 1: CORE INTELLIGENCE & LANGUAGE MASTERY ─────────
  # Primary reasoning, consensus gathering, and synthesis.

  - model: "mistralai/mistral-large-3-675b-instruct-2512" # [DEFAULT]
    role: "reasoning"
    priority: 1 
    max_tokens: 24576
    temperature: 0.7
    top_logprobs: 5
    enabled: true

  - model: "deepseek-ai/deepseek-v3.1-terminus"
    role: "reasoning"
    priority: 2
    max_tokens: 24576
    temperature: 0.6
    top_logprobs: 5
    enabled: true

  - model: "nvidia/nemotron-4-340b-instruct"
    role: "reasoning"
    priority: 3
    max_tokens: 24576
    temperature: 0.6
    top_logprobs: 5
    enabled: true

  - model: "moonshotai/kimi-k2-thinking"
    role: "reasoning"
    priority: 4
    max_tokens: 12288
    temperature: 0.6
    top_logprobs: 5
    enabled: true

  - model: "meta/llama-3.1-405b-instruct"
    role: "reasoning"
    priority: 5
    max_tokens: 24576
    temperature: 0.7
    top_logprobs: 5
