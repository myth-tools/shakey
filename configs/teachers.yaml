    priority: 6
    max_tokens: 49152
    temperature: 0.7
    top_logprobs: 5
    enabled: true

  - model: "z-ai/glm5"
    role: "reasoning"
    priority: 7
    max_tokens: 24576
    temperature: 0.6
    top_logprobs: 5
    enabled: true

  - model: "nvidia/nemotron-4-340b-instruct"             # [DEFAULT]
    role: "consensus"
    priority: 1
    max_tokens: 24576
    temperature: 0.5
    top_logprobs: 5
    enabled: true

  - model: "mistralai/mistral-large-3-675b-instruct-2512"
